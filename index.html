    <title>Year Three Vocabulary Station</title>
    <style>
        :root { --primary: #2563eb; --success: #059669; --danger: #dc2626; --bg: #f1f5f9; --card-bg: #ffffff; --text: #0f172a; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .main-wrapper { width: 100%; max-width: 850px; margin: 15px auto; display: block; }
        .student-card { background: var(--card-bg); border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); padding: 30px; text-align: center; box-sizing: border-box; display: block; position: relative; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; width: 100%; margin-top: 15px; clear: both; }
        .menu-btn { background-color: #f8fafc; color: var(--text); border: 2px solid #e2e8f0; padding: 16px; font-size: 1.02rem; border-radius: 10px; cursor: pointer; font-weight: bold; text-align: left; display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; width: 100%; position: relative; z-index: 10; transition: all 0.2s; }
        .menu-btn:hover { background-color: var(--primary); color: white; border-color: var(--primary); transform: translateY(-2px); }
        .top-navigation-bar { display: block; width: 100%; border-bottom: 2px solid #e2e8f0; padding-bottom: 12px; margin-bottom: 20px; text-align: left; box-sizing: border-box; }
        .nav-inner-layout { display: flex; justify-content: space-between; align-items: center; }
        .back-nav-btn { background: #e2e8f0; color: #475569; border: none; padding: 8px 14px; font-size: 0.9rem; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        .back-nav-btn:hover { background: #cbd5e1; color: var(--text); }
        .target-word { font-size: 4.2rem; font-weight: 800; letter-spacing: 1px; margin: 15px 0; transition: opacity 0.5s ease; color: var(--text); }
        .hidden-word { opacity: 0 !important; }
        .rule-box { background: #f8fafc; border-left: 5px solid var(--primary); padding: 20px; border-radius: 0 8px 8px 0; font-size: 1.15rem; margin: 20px 0; width: 100%; box-sizing: border-box; text-align: left; line-height: 1.6; }
        .rule-box strong { color: var(--primary); }
        .rule-box ul { margin: 8px 0; padding-left: 20px; }
        .lock-container { background: #fef2f2; border: 2px dashed var(--danger); border-radius: 8px; padding: 15px; margin: 0 auto; width: 100%; max-width: 400px; box-sizing: border-box; }
        .student-input { font-size: 1.5rem; padding: 12px; text-align: center; border: 3px solid #cbd5e1; border-radius: 8px; outline: none; width: 80%; max-width: 350px; display: inline-block; box-sizing: border-box; }
        .teacher-password-input { font-size: 1.3rem; padding: 8px; text-align: center; border: 3px solid #cbd5e1; border-radius: 8px; outline: none; width: 220px; display: inline-block; box-sizing: border-box; }
        button.action-btn { background-color: var(--primary); color: white; border: none; padding: 12px 28px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 20px; display: inline-block; }
        button.action-btn:hover { background-color: #1d4ed8; }
        .sentence-prompt { font-size: 1.6rem; margin-bottom: 25px; line-height: 1.6; text-align: center; }
        .feedback { font-size: 1.2rem; font-weight: bold; margin-top: 15px; }
        .feedback.success { color: var(--success); }
        .feedback.error { color: var(--danger); }
    </style>
</head>
